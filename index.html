<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vattern Results Lookup</title>
    <meta
      name="description"
      content="Search 2026 Vatternrundan and Tjejvattern result summaries by bib or name."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="control-band">
        <div class="brand-block">
          <p>Official 2026 public result data</p>
          <h1>Vattern Results Lookup</h1>
        </div>
        <div class="lookup-panel">
          <div id="race-tabs" class="race-tabs" role="tablist" aria-label="Race"></div>
          <label class="search-box">
            <span>Bib or name</span>
            <input id="search" inputmode="search" autocomplete="off" placeholder="21792" />
          </label>
          <div id="results" class="result-list"></div>
        </div>
      </section>

      <div id="selected-view">
        <section class="empty-band">
          <h2>Loading result data</h2>
          <p>Preparing lookup.</p>
        </section>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
